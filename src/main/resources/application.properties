# ===============================
# APPLICATION
# ===============================
spring.application.name=Ceylon-Harvest-Capital

# ===============================
# DATABASE (SUPABASE POSTGRES)
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:change-me}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=public

# ===============================
# SERVER
# ===============================
server.port=${SERVER_PORT:8080}
server.address=0.0.0.0
server.compression.enabled=false

# ===============================
# MVC / ASYNC
# ===============================
spring.mvc.async.request-timeout=5000

# ===============================
# MULTIPART FILE UPLOAD
# ===============================
# AC-3: 5 MB per individual file matches the business rule enforced in SupabaseStorageService.
# The request limit is set to 25 MB to allow up to 5 files per request with some headroom.
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:replace-with-a-secure-base64-secret}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ===============================
# DEFAULT ADMIN
# ===============================
admin.default.email=${ADMIN_DEFAULT_EMAIL:admin@chc.com}
admin.default.password=${ADMIN_DEFAULT_PASSWORD:change-me}
admin.default.fullName=${ADMIN_DEFAULT_FULLNAME:System Admin}

# ===============================
# GOOGLE OAUTH
# ===============================
google.client.id=${GOOGLE_CLIENT_ID:your-google-client-id}
google.client.secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}

# ===============================
# BLOCKCHAIN (POLYGON)
# ===============================
blockchain.rpc.url=${BLOCKCHAIN_RPC_URL:https://rpc-amoy.polygon.technology}
blockchain.wallet.privateKey=${BLOCKCHAIN_WALLET_PRIVATE_KEY:replace-with-wallet-private-key}
blockchain.polygonscan.url=${BLOCKCHAIN_POLYGONSCAN_URL:https://amoy.polygonscan.com/}
blockchain.wallet.address=${BLOCKCHAIN_WALLET_ADDRESS:replace-with-wallet-address}

# ===============================
# SUPABASE STORAGE
# ===============================
# supabase.url is the base project URL, e.g. https://abcdefghijk.supabase.co
supabase.url=${SUPABASE_URL:https://your-project-ref.supabase.co}
# Use the service_role key (from Project Settings ? API) ? keep this secret, never commit it
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:your-service-role-key}
# Name of the Supabase Storage bucket that holds milestone evidence files.
# Create this bucket in the Supabase dashboard (Storage ? New bucket).
# Set it to PUBLIC so the generated URLs are directly accessible by auditors.
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:milestone-evidence}

# ===============================
# LOGGING
# ===============================
logging.level.org.flywaydb=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
logging.level.org.hibernate.SQL=ERROR

# ===============================
# CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000