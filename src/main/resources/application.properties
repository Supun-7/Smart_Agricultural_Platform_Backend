# ===============================
# APPLICATION
# ===============================
spring.application.name=Ceylon-Harvest-Capital
spring.profiles.active=production

# ===============================
# DATABASE (SUPABASE POSTGRES)
# ===============================
spring.datasource.url=Database_URL
spring.datasource.username=Database_Username
spring.datasource.password=Database_Password
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# FLYWAY (IMPORTANT FOR YOUR ISSUE)
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=public

# ===============================
# SERVER
# ===============================
server.port=8080
server.address=0.0.0.0
server.compression.enabled=false

# ===============================
# MVC / ASYNC
# ===============================
spring.mvc.async.request-timeout=5000

# ===============================
# MULTIPART FILE UPLOAD
# ===============================
# AC-3: 5 MB per individual file matches the business rule enforced in SupabaseStorageService.
# The request limit is set to 25 MB to allow up to 5 files per request with some headroom.
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB


# ===============================
# JWT
# ===============================
jwt.secret=JWT_Secret
jwt.expiration=3600000

# ===============================
# DEFAULT ADMIN
# ===============================
admin.default.email=admin@chc.com
admin.default.password=Admin@CHC2026
admin.default.fullName=System Admin

# ===============================
# GOOGLE OAUTH
# ===============================
google.client.id=Google_Client_ID
google.client.secret=Google_Client_Secret

# ===============================
# BLOCKCHAIN (POLYGON AMOY)
# ===============================
# The CHC system wallet pays ALL gas fees using free Polygon Amoy testnet MATIC.
# Investors and farmers do NOT need a MetaMask or any crypto wallet.
#
# To get free MATIC for the system wallet:
#   1. Go to https://faucet.polygon.technology/
#   2. Select "Polygon Amoy"
#   3. Enter blockchain.wallet.address below
#   4. Click Submit
#
# To activate the real blockchain (production mode):
#   Run with: --spring.profiles.active=production
#   Without this flag, the app uses MockBlockchainService (no real transactions).
#
# IMPORTANT: blockchain.rpc.url must be the Polygon Amoy RPC endpoint,
# NOT the database URL (common mistake — they are different things).
blockchain.rpc.url=https://rpc-amoy.polygon.technology
blockchain.wallet.privateKey=Blockchain_Private_Key
blockchain.polygonscan.url=https://amoy.polygonscan.com/
blockchain.wallet.address=Blockchain_Wallet_Address

# ===============================
# SUPABASE STORAGE
# ===============================
# supabase.url is the base project URL, e.g. https://abcdefghijk.supabase.co
supabase.url=https://rmihwiomlmvisdwzoubs.supabase.co
# Use the service_role key (from Project Settings → API) — keep this secret, never commit it
supabase.service-role-key=Supabase_Service_Role_Key
# Name of the Supabase Storage bucket that holds milestone evidence files.
# Create this bucket in the Supabase dashboard (Storage → New bucket).
# Set it to PUBLIC so the generated URLs are directly accessible by auditors.
supabase.storage.bucket=milestone-evidence


# ===============================
# LOGGING (ADDED FOR DEBUGGING)
# ===============================
logging.level.org.flywaydb=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
logging.level.org.hibernate.SQL=ERROR

# ===============================
# CONNECTION POOL (OPTIONAL)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# DEEPSEEK CHATBOT
