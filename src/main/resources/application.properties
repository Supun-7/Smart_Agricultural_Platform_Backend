# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ===============================
# FLYWAY (IMPORTANT FOR YOUR ISSUE)
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=public

# ===============================
# SERVER
# ===============================
server.port=8080
server.address=0.0.0.0
server.compression.enabled=false

# ===============================
# MVC / ASYNC
# ===============================
spring.mvc.async.request-timeout=5000

# ===============================
# MULTIPART FILE UPLOAD
# ===============================
# AC-3: 5 MB per individual file matches the business rule enforced in SupabaseStorageService.
# The request limit is set to 25 MB to allow up to 5 files per request with some headroom.
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB


