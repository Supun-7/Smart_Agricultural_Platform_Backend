# ===============================
# APPLICATION
# ===============================
spring.application.name=Ceylon-Harvest-Capital
spring.profiles.active=${SPRING_PROFILES_ACTIVE:production}
# Load local .env file when present (dev convenience)
spring.config.import=optional:file:.env[.properties]
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:[*],https://*.vercel.app,https://*.netlify.app}

# ===============================
# DATABASE (SUPABASE POSTGRES)
# ===============================
spring.datasource.url=${DB_URL:${DATABASE_URL}}
spring.datasource.username=${DB_USERNAME:${DATABASE_USERNAME}}
spring.datasource.password=${DB_PASSWORD:${DATABASE_PASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=public

# ===============================
# SERVER
# ===============================
server.port=${SERVER_PORT:8081}
server.address=0.0.0.0
server.compression.enabled=false

# ===============================
# MVC / ASYNC
# ===============================
spring.mvc.async.request-timeout=5000

# ===============================
# MULTIPART FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ===============================
# DEFAULT ADMIN
# ===============================
admin.default.email=${ADMIN_DEFAULT_EMAIL:admin@chc.com}
admin.default.password=${ADMIN_DEFAULT_PASSWORD}
admin.default.fullName=${ADMIN_DEFAULT_FULLNAME:${ADMIN_DEFAULT_FULL_NAME:System Admin}}

# ===============================
# GOOGLE OAUTH
# ===============================
google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}
google.redirect.uri=${GOOGLE_REDIRECT_URI:http://localhost:5173/auth/callback}

# ===============================
# BLOCKCHAIN (POLYGON AMOY)
# ===============================
blockchain.rpc.url=${BLOCKCHAIN_RPC_URL:https://rpc-amoy.polygon.technology}
blockchain.wallet.privateKey=${BLOCKCHAIN_WALLET_PRIVATE_KEY}
blockchain.polygonscan.url=${BLOCKCHAIN_POLYGONSCAN_URL:https://amoy.polygonscan.com/}
blockchain.polygonscan.tx-base=${BLOCKCHAIN_POLYGONSCAN_TX_BASE:${blockchain.polygonscan.url}tx/}
blockchain.wallet.address=${BLOCKCHAIN_WALLET_ADDRESS}
external.doa.api.base-url=${EXTERNAL_DOA_API_BASE_URL:https://www.apiweb.doa.gov.lk}

# ===============================
# SUPABASE STORAGE
# ===============================
supabase.url=${SUPABASE_URL}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:milestone-evidence}

# ===============================
# LOGGING
# ===============================
logging.level.org.flywaydb=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
logging.level.org.hibernate.SQL=ERROR

# ===============================
# CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# CHATBOTS
# ===============================
deepseek.api.key=${DEEPSEEK_API_KEY}
deepseek.api.url=${DEEPSEEK_API_URL:https://api.deepseek.com}
deepseek.model=${DEEPSEEK_MODEL:deepseek-chat}

anthropic.api.key=${ANTHROPIC_API_KEY}
anthropic.api.url=${ANTHROPIC_API_URL:https://api.anthropic.com/v1/messages}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}

gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL:https://api.gemini.ai/v1/chat/completions}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# ===============================
# EMAIL / SMTP (OTP)
# ===============================
spring.mail.host=${SPRING_MAIL_HOST:${SMTP_HOST:smtp.gmail.com}}
spring.mail.port=${SPRING_MAIL_PORT:${SMTP_PORT:587}}
spring.mail.username=${SPRING_MAIL_USERNAME:${SMTP_USERNAME}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${SMTP_PASSWORD}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OTP Settings
otp.expiry.minutes=${OTP_EXPIRY_MINUTES:5}
otp.max.resend.count=${OTP_MAX_RESEND_COUNT:3}
otp.resend.window.minutes=${OTP_RESEND_WINDOW_MINUTES:10}
