name: Backend CI/CD

on:
  pull_request:
    branches: ["dev"]
  push:
    branches: ["dev"]

concurrency:
  group: be-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  APP_NAME: CHC-be

jobs:
  verify:
    name: Verify (Tests Skipped)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Package application
        run: ./mvnw -q -Dmaven.test.skip=true package

  build:
    name: Build Image
    needs: verify
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive deployment metadata
        run: |
          echo "IMAGE_REPO=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "DEPLOY_ENV=prod" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t "$IMAGE_REPO:$DEPLOY_ENV" \
            .

      - name: Push image
        run: |
          docker push "$IMAGE_REPO:$DEPLOY_ENV"

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    env:
      APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

    steps:
      - name: Derive deployment metadata
        run: |
          echo "IMAGE_REPO=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "DEPLOY_ENV=prod" >> "$GITHUB_ENV"
          echo "APP_DIR=/var/www/supervisesuite-backend" >> "$GITHUB_ENV"
          echo "CONTAINER_NAME=${APP_NAME}-prod" >> "$GITHUB_ENV"
          echo "NETWORK_ALIAS=${APP_NAME}-prod" >> "$GITHUB_ENV"

      - name: Install SSH client tools
        run: sudo apt-get update && sudo apt-get install -y openssh-client sshpass

      - name: Validate SSH settings
        run: |
          echo "SSH_HOST=$SSH_HOST"
          echo "SSH_PORT=$SSH_PORT"
          if [ -n "${SSH_USER:-}" ]; then
            echo "SSH_USER set? yes"
          else
            echo "SSH_USER set? no"
          fi
          echo "SSH_PASSWORD length: ${#SSH_PASSWORD}"
          echo "APP_ENV_FILE length: ${#APP_ENV_FILE}"
          if [ -z "${SSH_PORT:-}" ] || ! echo "$SSH_PORT" | grep -Eq '^[0-9]+$'; then
            echo "Invalid SSH_PORT: $SSH_PORT" >&2
            exit 1
          fi
          if [ -z "${SSH_PASSWORD:-}" ]; then
            echo "SSH_PASSWORD secret is required" >&2
            exit 1
          fi
          if [ -z "${APP_ENV_FILE:-}" ]; then
            echo "APP_ENV_FILE secret is required" >&2
            exit 1
          fi

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload environment file
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=yes"
          sshpass -p "$SSH_PASSWORD" ssh $SSH_OPTS -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "sudo mkdir -p '$APP_DIR' && sudo chown '$SSH_USER:$SSH_USER' '$APP_DIR'"
          printf '%s' "$APP_ENV_FILE" | sshpass -p "$SSH_PASSWORD" ssh $SSH_OPTS -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "cat > '$APP_DIR/.env'"

      - name: Deploy container
        env:
          NPM_NET_NAME: ${{ vars.NPM_NET_NAME }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=yes"
          sshpass -p "$SSH_PASSWORD" ssh $SSH_OPTS -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "APP_DIR='$APP_DIR' IMAGE='$IMAGE_REPO:$DEPLOY_ENV' CONTAINER_NAME='$CONTAINER_NAME' NETWORK_ALIAS='$NETWORK_ALIAS' NPM_NET_NAME='${NPM_NET_NAME:-app_app-network}' bash -s" <<'EOF'
          set -euo pipefail

          if ! docker network inspect "$NPM_NET_NAME" >/dev/null 2>&1; then
            docker network create --driver bridge "$NPM_NET_NAME"
          fi

          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
          docker pull "$IMAGE"
          docker run -d --name "$CONTAINER_NAME" \
            --env-file "$APP_DIR/.env" \
            --network "$NPM_NET_NAME" \
            --network-alias "$NETWORK_ALIAS" \
            --restart unless-stopped \
            "$IMAGE"

          docker image prune -f
          EOF
